<ion-content [fullscreen]="true" class="ion-padding" color="light">
  
  <div class="login-wrapper">
    <div class="brand-container">
      <ion-icon name="footsteps-outline" color="dark"></ion-icon>
      <h1>fundicion80</h1>
      <p>Exclusividad en sandalias a tu alcance</p>
    </div>

    <div class="form-container">
      <ion-item lines="none" class="custom-input">
        <ion-input 
          label="Correo electrónico" 
          labelPlacement="floating" 
          type="email" 
          [(ngModel)]="correo"
          placeholder="ejemplo@correo.com">
        </ion-input>
      </ion-item>

      <ion-item lines="none" class="custom-input ion-margin-top">
        <ion-input 
          label="Contraseña" 
          labelPlacement="floating" 
          type="password" 
          [(ngModel)]="contrasena"
          placeholder="••••••••">
        </ion-input>
      </ion-item>

      <ion-button expand="block" shape="round" class="login-btn ion-margin-top" (click)="ingresar()">
        Iniciar Sesión
      </ion-button>
      
      <ion-button expand="block" fill="clear" color="medium" size="small" (click)="registrar()">
        ¿No tienes cuenta? Regístrate aquí
      </ion-button>
    </div>
  </div>

</ion-content>
